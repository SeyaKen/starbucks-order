<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注文確認</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .order-card {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            width: 100%;
            max-width: 420px;
            animation: showUp 0.6s ease-out;
        }
        @keyframes showUp {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .icon {
            font-size: 80px;
            margin-bottom: 15px;
            display: inline-block;
            animation: gentleShake 2s infinite ease-in-out;
        }
        @keyframes gentleShake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        h1 { color: #006241; font-size: 24px; margin-bottom: 20px; }
        .main-item { font-size: 26px; color: #333; font-weight: 800; margin-bottom: 15px; }
        
        .details-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .tag {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
        }
        .tag.size { background-color: #333; color: white; } /* サイズは黒背景で強調 */
        .tag.item { background-color: #d4e9e2; color: #006241; }
        .tag.vessel { background-color: #fff3e0; color: #e65100; }
        .tag.option { background-color: #fce4ec; color: #c2185b; border: 2px solid #c2185b; }
        .tag.location { background-color: #e3f2fd; color: #1565c0; }
    </style>
</head>
<body>

<div class="order-card">
    <span class="icon">☕</span>
    <h1>ご注文</h1>
    
    <div class="details-wrapper" style="margin-bottom: 15px;">
        <div class="tag size">Short</div> <!-- サイズを追加 -->
    </div>
    
    <div class="main-item">ブリュードコーヒー</div>
    
    <div class="details-wrapper">
        <div class="tag vessel">マグカップ</div>
        <div class="tag option">デカフェ</div>
        <div class="tag location">店内利用</div>
    </div>
</div>

</body>
</html>
