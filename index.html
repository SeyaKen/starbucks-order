<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注文確認</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
        }
        .order-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .icon { font-size: 80px; margin-bottom: 20px; display: block; }
        h1 { color: #006241; font-size: 24px; margin: 10px 0; }
        .details { font-size: 20px; color: #333; font-weight: bold; margin-top: 10px; }
        .tag {
            display: inline-block;
            background: #e0e0e0;
            padding: 5px 15px;
            border-radius: 20px;
            margin: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="order-card">
    <span class="icon">☕</span>
    <h1>ご注文</h1>
    <div class="details">
        <div class="tag">ブリュードコーヒー</div>
        <div class="tag">マグカップ</div>
    </div>
</div>

</body>
</html>
